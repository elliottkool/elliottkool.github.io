<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>elliotts place</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: #fff;
        font-family: 'Comic Sans MS', cursive;
        overflow-x: hidden;
      }

      img {
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
        display: block;
      }

      .layout {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        width: 100vw;
      }

      .column {
        flex: 0 0 38vw;
        margin-left: -4vw;
      }

      .column:first-child {
        margin-left: 0;
      }

      .panel-frame {
        position: relative;
        width: 100%;
      }

      .panel-image {
        width: 100%;
        height: auto;
      }

      .panel-content {
        position: absolute;
        top: 22%;
        left: 13%;
        right: 13%;
        bottom: 10%;
      }

      /* Posts */
      .post-entry {
        position: relative;
        width: 100%;
        margin-bottom: 0.5rem;
      }

      .post-entry img {
        width: 100%;
        height: auto;
      }

      .post-link {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #000;
        font-family: 'Comic Sans MS', cursive;
        font-size: clamp(0.6rem, 1.3vw, 1rem);
        pointer-events: all;
        z-index: 1;
      }

      /* Apps */
      .app-tray {
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 0.75rem;
        width: 100%;
        height: 100%;
      }

      .app-icon {
        background: transparent;
        border: none;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        pointer-events: all;
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        color: #000;
      }

      /* Modal */
      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .modal.is-open {
        display: flex;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      .window {
        position: relative;
        width: min(500px, 90vw);
        z-index: 1;
      }

      .window-image {
        width: 100%;
        height: auto;
      }

      .window-image-hover {
        position: absolute;
        inset: 0;
        width: 100%;
        height: auto;
        opacity: 0;
      }

      .window.is-hovering-close .window-image-hover {
        opacity: 1;
      }

      .window-content {
        position: absolute;
        top: 20%;
        right: 29%;
        bottom: 16%;
        left: 34%;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.88);
        padding: 0.9rem;
      }

      .window-close-hitbox {
        position: absolute;
        top: 8%;
        right: 6%;
        width: 10%;
        height: 14%;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
        pointer-events: all;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="column about-column">
        <div class="panel-frame about-panel">
          <img
            class="panel-image"
            src="assets/about.png"
            alt="About panel"
            draggable="false"
            oncontextmenu="return false"
          />
        </div>
      </section>

      <section class="column posts-column">
        <div class="panel-frame posts-panel">
          <img
            class="panel-image"
            src="assets/posts.png"
            alt="Posts panel"
            draggable="false"
            oncontextmenu="return false"
          />
          <div class="panel-content">
            <div class="post-entry">
              <img
                src="assets/post.png"
                alt=""
                aria-hidden="true"
                draggable="false"
                oncontextmenu="return false"
              />
              <a href="posts/post-1.html" class="post-link">Post Title 1</a>
            </div>
            <div class="post-entry">
              <img
                src="assets/post.png"
                alt=""
                aria-hidden="true"
                draggable="false"
                oncontextmenu="return false"
              />
              <a href="posts/post-2.html" class="post-link">Post Title 2</a>
            </div>
            <div class="post-entry">
              <img
                src="assets/post.png"
                alt=""
                aria-hidden="true"
                draggable="false"
                oncontextmenu="return false"
              />
              <a href="posts/post-3.html" class="post-link">Post Title 3</a>
            </div>
          </div>
        </div>
      </section>

      <section class="column apps-column">
        <div class="panel-frame apps-panel">
          <img
            class="panel-image"
            src="assets/apptray.png"
            alt="Apps panel"
            draggable="false"
            oncontextmenu="return false"
          />
          <div class="panel-content">
            <div class="app-tray">
              <button
                class="app-icon js-open-window"
                type="button"
                aria-label="Open App 1 placeholder window"
                data-window-label="App 1 placeholder window"
              >
                <span aria-hidden="true">🖥️</span>
                <span>App 1</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal" id="app-window" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="window" role="dialog" aria-modal="true" aria-label="App 1 placeholder window">
        <img
          class="window-image window-image-default"
          src="assets/window.png"
          alt=""
          aria-hidden="true"
          draggable="false"
          oncontextmenu="return false"
        />
        <img
          class="window-image window-image-hover"
          src="assets/windowhover.png"
          alt=""
          aria-hidden="true"
          draggable="false"
          oncontextmenu="return false"
        />
        <button class="window-close-hitbox" type="button" aria-label="Close window"></button>
        <div class="window-content">
          <p>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut
            labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco
            laboris nisi ut aliquip ex ea commodo consequat.
          </p>
        </div>
      </div>
    </div>

    <script>
      const modal = document.getElementById('app-window');
      const windowFrame = modal.querySelector('.window');
      const FOCUSABLE_SELECTOR =
        'button:not([disabled]), [role="button"], [href], input, select, textarea, details, audio[controls], video[controls], [tabindex]:not([tabindex="-1"])';
      const closeHitbox = modal.querySelector('.window-close-hitbox');
      const backdrop = modal.querySelector('.modal-backdrop');
      const openButtons = document.querySelectorAll('.js-open-window');
      let lastTriggerButton = null;

      function getFocusableInModal() {
        return modal.querySelectorAll(FOCUSABLE_SELECTOR);
      }

      function openWindow(triggerButton) {
        lastTriggerButton = triggerButton;
        windowFrame.setAttribute(
          'aria-label',
          triggerButton?.dataset.windowLabel || 'App window placeholder'
        );
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        closeHitbox.focus();
      }

      function closeWindow() {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        windowFrame.classList.remove('is-hovering-close');
        if (lastTriggerButton) {
          lastTriggerButton.focus();
        }
      }

      openButtons.forEach((button) => {
        button.addEventListener('click', () => openWindow(button));
      });

      closeHitbox.addEventListener('mouseenter', () => {
        windowFrame.classList.add('is-hovering-close');
      });

      closeHitbox.addEventListener('mouseleave', () => {
        windowFrame.classList.remove('is-hovering-close');
      });

      closeHitbox.addEventListener('focus', () => {
        windowFrame.classList.add('is-hovering-close');
      });

      closeHitbox.addEventListener('blur', () => {
        windowFrame.classList.remove('is-hovering-close');
      });

      closeHitbox.addEventListener('click', closeWindow);
      backdrop.addEventListener('click', closeWindow);

      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Tab' && event.key !== 'Escape') {
          return;
        }

        const isModalOpen = modal.classList.contains('is-open');
        if (!isModalOpen) {
          return;
        }

        if (event.key === 'Tab') {
          const focusable = getFocusableInModal();
          if (!focusable.length) {
            event.preventDefault();
            return;
          }

          const first = focusable[0];
          const last = focusable[focusable.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }

        if (event.key === 'Escape') {
          closeWindow();
        }
      });
    </script>
  </body>
</html>
