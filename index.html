<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>elliotts place</title>
    <style>
      @font-face { font-family: 'Elliottfont'; src: url('./Elliottfont-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
      html { font-size: 300%; }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; background: #fff; font-family: 'Elliottfont', cursive; overflow-x: hidden; }
      img { user-select: none; -webkit-user-drag: none; pointer-events: none; display: block; }
      .menu-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 0; padding: 0.5rem 0.75rem; z-index: 10000; }
      .menu-icon-link { position: relative; display: inline-flex; text-decoration: none; pointer-events: all; }
      .menu-icon-link::before { content: none; }
      .menu-icon-image { position: relative; z-index: 1; display: block; pointer-events: all; }
      .layout { display: flex; align-items: flex-start; justify-content: center; width: 100vw; padding-top: 5rem; }
      .column { flex: 0 0 38vw; margin-left: -4vw; }
      .column:first-child { margin-left: 0; }
      .panel-frame { position: relative; width: 100%; }
      .panel-image { width: 100%; height: auto; }
      .posts-panel .panel-content { position: absolute; top: 28%; left: 27%; right: 27%; bottom: 8%; overflow: hidden; }
      .apps-panel .panel-content { position: absolute; top: 28%; left: 32%; right: 8%; bottom: 8%; overflow: hidden; }
      .post-entry { position: relative; width: 100%; margin-bottom: 0.5rem; }
      .post-entry > img { width: 100%; height: auto; display: block; }
      .post-link { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #000; font-family: 'Elliottfont', cursive; font-size: clamp(0.6rem, 1.3vw, 1rem); pointer-events: all; z-index: 1; }
      .app-tray { display: flex; flex-wrap: wrap; align-content: flex-start; align-items: flex-start; justify-content: flex-start; gap: 0.75rem; width: 100%; height: 100%; }
      .app-icon { background: transparent; border: none; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: all; font-size: clamp(0.6rem, 1.2vw, 0.9rem); color: #000; }
      .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 9999; }
      .modal.is-open { display: flex; }
      .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
      .window { position: relative; width: min(500px, 90vw); z-index: 1; }
      .window-image { width: 100%; height: auto; }
      .window-image-highlight { position: absolute; inset: 0; width: 100%; height: auto; opacity: 0; }
      .window.is-hovering-close .window-image-highlight { opacity: 1; }
      .window-content { position: absolute; top: 20%; right: 29%; bottom: 16%; left: 34%; overflow-y: auto; background: rgba(255,255,255,0.88); padding: 0.9rem; }
      .window-close-hitbox { position: absolute; top: 8%; right: 6%; width: 10%; height: 14%; border: 0; padding: 0; background: transparent; cursor: pointer; pointer-events: all; }
    </style>
  </head>
  <body>
    <nav class="menu-bar" aria-label="Main menu">
      <a class="menu-icon-link js-menu-icon-link" href="index.html" aria-label="Home">
        <img class="js-menu-icon menu-icon-image" src="assets/home.png" data-default-src="assets/home.png" data-hover-src="assets/homesel.png" alt="Home icon" draggable="false" oncontextmenu="return false" />
      </a>
      <a class="menu-icon-link js-menu-icon-link" href="#about" aria-label="About">
        <img class="js-menu-icon menu-icon-image" src="assets/about.png" data-default-src="assets/about.png" data-hover-src="assets/aboutsel.png" alt="About icon" draggable="false" oncontextmenu="return false" />
      </a>
      <a class="menu-icon-link js-menu-icon-link" href="#words" aria-label="Words">
        <img class="js-menu-icon menu-icon-image" src="assets/words.png" data-default-src="assets/words.png" data-hover-src="assets/wordssel.png" alt="Words icon" draggable="false" oncontextmenu="return false" />
      </a>
      <a class="menu-icon-link js-menu-icon-link" href="#pictures" aria-label="Pictures">
        <img class="js-menu-icon menu-icon-image" src="assets/pictures.png" data-default-src="assets/pictures.png" data-hover-src="assets/picturessel.png" alt="Pictures icon" draggable="false" oncontextmenu="return false" />
      </a>
    </nav>
    <main class="layout">
      <section class="column about-column" id="about">
        <div class="panel-frame about-panel">
          <img class="panel-image" src="assets/about.png" alt="About panel" draggable="false" oncontextmenu="return false" />
        </div>
      </section>
      <section class="column posts-column" id="words">
        <div class="panel-frame posts-panel">
          <img class="panel-image" src="assets/posts.png" alt="Posts panel" draggable="false" oncontextmenu="return false" />
          <div class="panel-content">
            <div class="post-entry">
              <img src="assets/post.png" alt="" aria-hidden="true" draggable="false" oncontextmenu="return false" />
              <a href="posts/post-1.html" class="post-link">Post Title 1</a>
            </div>
            <div class="post-entry">
              <img src="assets/post.png" alt="" aria-hidden="true" draggable="false" oncontextmenu="return false" />
              <a href="posts/post-2.html" class="post-link">Post Title 2</a>
            </div>
            <div class="post-entry">
              <img src="assets/post.png" alt="" aria-hidden="true" draggable="false" oncontextmenu="return false" />
              <a href="posts/post-3.html" class="post-link">Post Title 3</a>
            </div>
          </div>
        </div>
      </section>
      <section class="column apps-column" id="pictures">
        <div class="panel-frame apps-panel">
          <img class="panel-image" src="assets/apptray.png" alt="Apps panel" draggable="false" oncontextmenu="return false" />
          <div class="panel-content">
            <div class="app-tray">
              <button class="app-icon js-open-window" type="button" aria-label="Open App 1 placeholder window" data-window-label="App 1 placeholder window">
                <span aria-hidden="true">🖥️</span>
                <span>App 1</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div class="modal" id="app-window" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="window" role="dialog" aria-modal="true" aria-label="App 1 placeholder window">
        <img class="window-image window-image-default" src="assets/window.png" alt="" aria-hidden="true" draggable="false" oncontextmenu="return false" />
        <img class="window-image window-image-highlight" src="assets/windowhighlight.png" alt="" aria-hidden="true" draggable="false" oncontextmenu="return false" />
        <button class="window-close-hitbox" type="button" aria-label="Close window"></button>
        <div class="window-content">
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        </div>
      </div>
    </div>
    <script>
      const modal = document.getElementById('app-window');
      const windowFrame = modal.querySelector('.window');
      const FOCUSABLE_SELECTOR = 'button:not([disabled]), [role="button"], [href], input, select, textarea, details, audio[controls], video[controls], [tabindex]:not([tabindex="-1"])';
      const closeHitbox = modal.querySelector('.window-close-hitbox');
      const backdrop = modal.querySelector('.modal-backdrop');
      const openButtons = document.querySelectorAll('.js-open-window');
      const menuIconLinks = document.querySelectorAll('.js-menu-icon-link');
      let lastTriggerButton = null;
      function getFocusableInModal() { return modal.querySelectorAll(FOCUSABLE_SELECTOR); }
      function setMenuIconState(icon, isHovering) {
        icon.setAttribute('src', isHovering ? icon.dataset.hoverSrc : icon.dataset.defaultSrc);
      }
      function openWindow(triggerButton) {
        lastTriggerButton = triggerButton;
        windowFrame.setAttribute('aria-label', triggerButton?.dataset.windowLabel || 'App window placeholder');
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        closeHitbox.focus();
      }
      function closeWindow() {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        windowFrame.classList.remove('is-hovering-close');
        if (lastTriggerButton) { lastTriggerButton.focus(); }
      }
      openButtons.forEach((button) => { button.addEventListener('click', () => openWindow(button)); });
      menuIconLinks.forEach((link) => {
        const icon = link.querySelector('.js-menu-icon');
        link.addEventListener('mouseenter', () => setMenuIconState(icon, true));
        link.addEventListener('mouseleave', () => setMenuIconState(icon, false));
        link.addEventListener('focus', () => setMenuIconState(icon, true));
        link.addEventListener('blur', () => setMenuIconState(icon, false));
      });
      closeHitbox.addEventListener('mouseenter', () => { windowFrame.classList.add('is-hovering-close'); });
      closeHitbox.addEventListener('mouseleave', () => { windowFrame.classList.remove('is-hovering-close'); });
      closeHitbox.addEventListener('focus', () => { windowFrame.classList.add('is-hovering-close'); });
      closeHitbox.addEventListener('blur', () => { windowFrame.classList.remove('is-hovering-close'); });
      closeHitbox.addEventListener('click', closeWindow);
      backdrop.addEventListener('click', closeWindow);
      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Tab' && event.key !== 'Escape') return;
        if (!modal.classList.contains('is-open')) return;
        if (event.key === 'Tab') {
          const focusable = getFocusableInModal();
          if (!focusable.length) { event.preventDefault(); return; }
          const first = focusable[0], last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
          else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
        }
        if (event.key === 'Escape') { closeWindow(); }
      });
    </script>
  </body>
</html>
