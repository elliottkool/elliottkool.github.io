<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>elliotts place</title>
    <style>
      :root {
        --posts-content-top: 24%;
        --posts-content-right: 23%;
        --posts-content-bottom: 17%;
        --posts-content-left: 23%;
        --apps-content-top: 28%;
        --apps-content-right: 30%;
        --apps-content-bottom: 20%;
        --apps-content-left: 30%;
        --window-content-top: 20%;
        --window-content-right: 29%;
        --window-content-bottom: 16%;
        --window-content-left: 34%;
        --window-close-top: 9%;
        --window-close-right: 32%;
        --window-close-width: 8%;
        --window-close-height: 12%;
        --window-width: 500px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
        /* TODO: Swap this placeholder with custom font when provided */
        font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      }

      .layout {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 1rem;
        min-height: 100vh;
        padding: 1rem;
      }

      .column {
        min-height: 0;
        flex: 1 1 0;
        min-width: 0;
      }

      .panel-frame {
        position: relative;
        width: 100%;
      }

      img {
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .panel-image {
        display: block;
        width: 100%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .panel-content {
        position: absolute;
        overflow: hidden;
      }

      .posts-panel .panel-content {
        top: var(--posts-content-top);
        right: var(--posts-content-right);
        bottom: var(--posts-content-bottom);
        left: var(--posts-content-left);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .posts-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .post-entry-wrapper {
        position: relative;
        width: 100%;
      }

      .post-entry-wrapper img {
        width: 100%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .post-entry-link {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 18%;
        color: #000;
        font-size: clamp(0.7rem, 1.4vw, 1rem);
        text-decoration: none;
        text-align: center;
        line-height: 1.2;
        background: transparent;
        cursor: pointer;
      }

      .post-entry-link:hover,
      .post-entry-link:focus-visible {
        text-decoration: underline;
      }

      .apps-panel .panel-content {
        top: var(--apps-content-top);
        right: var(--apps-content-right);
        bottom: var(--apps-content-bottom);
        left: var(--apps-content-left);
      }

      .app-tray {
        display: grid;
        grid-template-columns: repeat(2, minmax(72px, 1fr));
        gap: 0.75rem;
        align-content: start;
        height: 100%;
        overflow-y: auto;
      }

      .app-icon {
        border: 1px solid #000;
        background: rgba(255, 255, 255, 0.92);
        min-height: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        gap: 0.25rem;
      }

      .app-icon span[aria-hidden='true'] {
        font-size: 1.25rem;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .modal.is-open {
        display: flex;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      .window {
        position: relative;
        width: min(var(--window-width), 90vw);
        z-index: 1;
      }

      .window-image {
        display: block;
        width: 100%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .window-image-hover {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .window.is-hovering-close .window-image-hover {
        opacity: 1;
      }

      .window-content {
        position: absolute;
        top: var(--window-content-top);
        right: var(--window-content-right);
        bottom: var(--window-content-bottom);
        left: var(--window-content-left);
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.88);
        padding: 0.9rem;
      }

      .window-close-hitbox {
        position: absolute;
        top: var(--window-close-top);
        right: var(--window-close-right);
        width: var(--window-close-width);
        height: var(--window-close-height);
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      @media (max-width: 900px) {
        .layout {
          flex-wrap: wrap;
        }

        .column {
          flex-basis: min(500px, 100%);
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="column">
        <div class="panel-frame about-panel">
          <img
            class="panel-image about-panel-image"
            src="assets/about.png"
            draggable="false"
            oncontextmenu="return false"
            alt="About panel"
          />
        </div>
      </section>

      <section class="column">
        <div class="panel-frame posts-panel">
          <img
            class="panel-image posts-panel-image"
            src="assets/posts.png"
            draggable="false"
            oncontextmenu="return false"
            alt="Posts panel"
          />
          <div class="panel-content">
            <div class="posts-list">
              <div class="post-entry-wrapper">
                <img src="assets/post.png" draggable="false" oncontextmenu="return false" alt="" />
                <a href="posts/post-1.html" class="post-entry-link">Post Title 1</a>
              </div>
              <div class="post-entry-wrapper">
                <img src="assets/post.png" draggable="false" oncontextmenu="return false" alt="" />
                <a href="posts/post-2.html" class="post-entry-link">Post Title 2</a>
              </div>
              <div class="post-entry-wrapper">
                <img src="assets/post.png" draggable="false" oncontextmenu="return false" alt="" />
                <a href="posts/post-3.html" class="post-entry-link">Post Title 3</a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="column">
        <div class="panel-frame apps-panel">
          <img
            class="panel-image apps-panel-image"
            src="assets/apptray.png"
            draggable="false"
            oncontextmenu="return false"
            alt="Apps panel"
          />
          <div class="panel-content">
            <div class="app-tray">
              <button
                class="app-icon js-open-window"
                type="button"
                aria-label="Open App 1 placeholder window"
                data-window-label="App 1 placeholder window"
              >
                <span aria-hidden="true">🖥️</span>
                <span>App 1</span>
              </button>

              <!-- TODO: Add additional app icons (about 6 total planned) -->
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal" id="app-window" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="window" role="dialog" aria-modal="true" aria-label="App 1 placeholder window">
        <img
          class="window-image window-image-default"
          src="assets/window.png"
          draggable="false"
          oncontextmenu="return false"
          alt=""
          aria-hidden="true"
        />
        <img
          class="window-image window-image-hover"
          src="assets/windowhover.png"
          draggable="false"
          oncontextmenu="return false"
          alt=""
          aria-hidden="true"
        />
        <button class="window-close-hitbox" type="button" aria-label="Close window"></button>
        <div class="window-content">
          <!-- TODO: Replace this placeholder text with real app content -->
          <p>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do
            eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim
            ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut
            aliquip ex ea commodo consequat.
          </p>
        </div>
      </div>
    </div>

    <script>
      const modal = document.getElementById('app-window');
      const windowFrame = modal.querySelector('.window');
      const FOCUSABLE_SELECTOR =
        'button:not([disabled]), [role="button"], [href], input, select, textarea, details, audio[controls], video[controls], [tabindex]:not([tabindex="-1"])';
      const closeHitbox = modal.querySelector('.window-close-hitbox');
      const backdrop = modal.querySelector('.modal-backdrop');
      const openButtons = document.querySelectorAll('.js-open-window');
      let lastTriggerButton = null;

      function getFocusableInModal() {
        return modal.querySelectorAll(FOCUSABLE_SELECTOR);
      }

      function openWindow(triggerButton) {
        lastTriggerButton = triggerButton;
        windowFrame.setAttribute(
          'aria-label',
          triggerButton?.dataset.windowLabel || 'App window placeholder'
        );
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        closeHitbox.focus();
      }

      function closeWindow() {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        windowFrame.classList.remove('is-hovering-close');
        if (lastTriggerButton) {
          lastTriggerButton.focus();
        }
      }

      openButtons.forEach((button) => {
        button.addEventListener('click', () => openWindow(button));
      });

      closeHitbox.addEventListener('mouseenter', () => {
        windowFrame.classList.add('is-hovering-close');
      });

      closeHitbox.addEventListener('mouseleave', () => {
        windowFrame.classList.remove('is-hovering-close');
      });

      closeHitbox.addEventListener('focus', () => {
        windowFrame.classList.add('is-hovering-close');
      });

      closeHitbox.addEventListener('blur', () => {
        windowFrame.classList.remove('is-hovering-close');
      });

      closeHitbox.addEventListener('click', closeWindow);
      backdrop.addEventListener('click', closeWindow);

      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Tab' && event.key !== 'Escape') {
          return;
        }

        const isModalOpen = modal.classList.contains('is-open');
        if (!isModalOpen) {
          return;
        }

        if (event.key === 'Tab') {
          const focusable = getFocusableInModal();
          if (!focusable.length) {
            event.preventDefault();
            return;
          }

          const first = focusable[0];
          const last = focusable[focusable.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }

        if (event.key === 'Escape') {
          closeWindow();
        }
      });
    </script>
  </body>
</html>
